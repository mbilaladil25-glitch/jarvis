<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JARVIS</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0a0f; overflow: hidden; width: 100vw; height: 100vh;
  display: flex; justify-content: center; align-items: center;
  font-family: 'Montserrat', sans-serif;
}
.bg-grid {
  position: fixed; inset: 0;
  background-image: linear-gradient(rgba(100,150,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(100,150,255,0.03) 1px, transparent 1px);
  background-size: 50px 50px; background-position: center center;
}
.vignette {
  position: fixed; inset: 0;
  background: radial-gradient(circle at center, transparent 0%, rgba(0,0,0,0.4) 80%, rgba(0,0,0,0.8) 100%);
  pointer-events: none;
}
.jarvis-container {
  position: relative; width: 400px; height: 400px;
  display: flex; justify-content: center; align-items: center;
}
.halo {
  position: absolute; width: 280px; height: 280px; border-radius: 50%;
  background: radial-gradient(circle, rgba(0,150,255,0.25) 0%, rgba(100,255,255,0.1) 40%, transparent 70%);
  filter: blur(20px); animation: pulse 4s ease-in-out infinite;
}
@keyframes pulse {
  0%,100% { opacity: 0.6; transform: scale(0.95); }
  50% { opacity: 1; transform: scale(1.05); }
}
.dotted-ring {
  position: absolute; width: 320px; height: 320px; border-radius: 50%;
  border: 2px dotted rgba(100,255,255,0.6); animation: rotate 20s linear infinite;
}
.arc-ring {
  position: absolute; width: 300px; height: 300px; border-radius: 50%;
  border: 3px solid transparent; border-top-color: rgba(100,255,255,0.9); border-right-color: rgba(100,255,255,0.3);
  animation: rotate 3s linear infinite;
}
.arc-ring-2 {
  position: absolute; width: 300px; height: 300px; border-radius: 50%;
  border: 3px solid transparent; border-bottom-color: rgba(100,255,255,0.8); border-left-color: rgba(100,255,255,0.2);
  animation: rotate-reverse 5s linear infinite;
}
.arc-thin {
  position: absolute; width: 260px; height: 260px; border-radius: 50%;
  border: 1.5px solid transparent; border-top-color: rgba(100,255,255,0.5);
  animation: rotate 8s linear infinite;
}
@keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
@keyframes rotate-reverse { from { transform: rotate(360deg); } to { transform: rotate(0deg); } }
.center-ring {
  position: absolute; width: 140px; height: 140px; border-radius: 50%;
  border: 3px solid rgba(255,255,255,0.95);
  box-shadow: 0 0 20px rgba(100,255,255,0.3), inset 0 0 20px rgba(100,255,255,0.1);
  display: flex; justify-content: center; align-items: center; background: rgba(0,0,0,0.2);
}
.center-ring.listening {
  border-color: rgba(255,170,0,1);
  box-shadow: 0 0 40px rgba(255,170,0,0.6), inset 0 0 30px rgba(255,170,0,0.3);
  animation: listenPulse 0.8s ease-in-out infinite;
}
.center-ring.speaking {
  border-color: rgba(100,255,255,1);
  box-shadow: 0 0 40px rgba(100,255,255,0.6), inset 0 0 30px rgba(100,255,255,0.3);
  animation: speakPulse 0.5s ease-in-out infinite;
}
.center-ring.error {
  border-color: rgba(255,60,60,1);
  box-shadow: 0 0 40px rgba(255,60,60,0.6), inset 0 0 30px rgba(255,60,60,0.3);
}
@keyframes listenPulse {
  0%,100% { box-shadow: 0 0 30px rgba(255,170,0,0.4), inset 0 0 20px rgba(255,170,0,0.2); }
  50% { box-shadow: 0 0 60px rgba(255,170,0,0.8), inset 0 0 40px rgba(255,170,0,0.5); }
}
@keyframes speakPulse {
  0%,100% { box-shadow: 0 0 30px rgba(100,255,255,0.4), inset 0 0 20px rgba(100,255,255,0.2); }
  50% { box-shadow: 0 0 60px rgba(100,255,255,0.8), inset 0 0 40px rgba(100,255,255,0.5); }
}
.jarvis-text {
  color: white; font-size: 24px; font-weight: 500; letter-spacing: 8px;
  text-transform: uppercase; text-shadow: 0 0 10px rgba(255,255,255,0.5);
  margin-left: 4px; pointer-events: none;
}
.particle {
  position: absolute; background: white; border-radius: 50%;
  opacity: 0.8; box-shadow: 0 0 4px rgba(255,255,255,0.8);
}
.p1 { width:2px;height:2px;top:30%;left:25%;animation:float 6s ease-in-out infinite; }
.p2 { width:3px;height:3px;top:20%;right:30%;animation:float 8s ease-in-out infinite 1s; }
.p3 { width:2px;height:2px;bottom:35%;left:20%;animation:float 7s ease-in-out infinite 2s; }
.p4 { width:2px;height:2px;top:40%;right:20%;animation:float 5s ease-in-out infinite 0.5s; }
.p5 { width:3px;height:3px;bottom:25%;right:25%;animation:float 9s ease-in-out infinite 1.5s; }
@keyframes float {
  0%,100% { transform:translateY(0) translateX(0); opacity:0.4; }
  50% { transform:translateY(-10px) translateX(5px); opacity:1; }
}
@media (max-width:600px) { .jarvis-container { transform: scale(0.7); } }

.status-text {
  position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
  font-size: 11px; letter-spacing: 3px; color: rgba(255,255,255,0.3);
  text-transform: uppercase; font-weight: 300; z-index: 10; text-align: center;
  line-height: 1.6;
}
.heard-text {
  position: fixed; bottom: 60px; left: 50%; transform: translateX(-50%);
  font-size: 14px; letter-spacing: 2px; color: rgba(0,200,255,0.7);
  text-transform: uppercase; font-weight: 300; opacity: 0;
  transition: opacity 0.3s; text-align: center; max-width: 80vw; z-index: 10;
}
.heard-text.visible { opacity: 1; }
.reply-text {
  position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
  font-size: 13px; letter-spacing: 1px; color: rgba(255,255,255,0.5);
  font-weight: 300; opacity: 0; transition: opacity 0.3s;
  text-align: center; max-width: 80vw; font-style: italic; z-index: 10;
}
.reply-text.visible { opacity: 1; }
.tap-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 200;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  cursor: pointer; transition: opacity 0.5s;
}
.tap-overlay.hidden { opacity: 0; pointer-events: none; }
.tap-text {
  font-size: 12px; letter-spacing: 4px; color: rgba(255,255,255,0.4);
  text-transform: uppercase; animation: tapPulse 2s ease-in-out infinite;
}
@keyframes tapPulse { 0%,100% { opacity: 0.4; } 50% { opacity: 1; } }

/* Chat panel — original JARVIS design */
.chat-toggle {
  position: fixed; bottom: 20px; right: 20px; width: 44px; height: 44px;
  border-radius: 50%; background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.12); color: rgba(255,255,255,0.4);
  font-size: 16px; cursor: pointer; z-index: 50;
  display: flex; align-items: center; justify-content: center; transition: all 0.3s;
}
.chat-toggle:hover { border-color: rgba(100,255,255,0.5); color: rgba(100,255,255,0.8); }
.chat-toggle.active { border-color: rgba(100,255,255,0.6); color: rgba(100,255,255,0.9); }
.chat-panel {
  position: fixed; bottom: 74px; right: 20px; width: 360px; max-height: 480px;
  background: rgba(10,10,20,0.92); border: 1px solid rgba(255,255,255,0.08);
  border-radius: 12px; display: none; flex-direction: column; z-index: 50;
  backdrop-filter: blur(20px); overflow: hidden;
}
.chat-panel.open { display: flex; }
.chat-header {
  padding: 12px 16px; border-bottom: 1px solid rgba(255,255,255,0.06);
  font-size: 10px; letter-spacing: 3px; color: rgba(255,255,255,0.3);
  text-transform: uppercase; display: flex; justify-content: space-between; align-items: center;
}
.chat-header-status { font-size: 9px; color: rgba(0,255,100,0.5); letter-spacing: 2px; }
.chat-messages {
  flex: 1; overflow-y: auto; padding: 12px 16px;
  display: flex; flex-direction: column; gap: 10px; max-height: 340px;
}
.chat-messages::-webkit-scrollbar { width: 3px; }
.chat-messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
.chat-msg {
  max-width: 85%; padding: 8px 12px; border-radius: 10px;
  font-size: 12px; line-height: 1.5; letter-spacing: 0.3px; word-wrap: break-word;
}
.chat-msg.user {
  align-self: flex-end; background: rgba(100,255,255,0.1);
  border: 1px solid rgba(100,255,255,0.15); color: rgba(255,255,255,0.8);
}
.chat-msg.jarvis {
  align-self: flex-start; background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.06); color: rgba(255,255,255,0.5);
}
.chat-msg.system {
  align-self: center; background: rgba(255,170,0,0.06);
  border: 1px solid rgba(255,170,0,0.1); color: rgba(255,200,100,0.6);
  font-size: 10px; letter-spacing: 1px; max-width: 95%;
}
.chat-msg.error {
  align-self: center; background: rgba(255,60,60,0.06);
  border: 1px solid rgba(255,60,60,0.1); color: rgba(255,100,100,0.6);
  font-size: 10px; max-width: 95%;
}
.chat-input-wrap {
  padding: 12px 16px; border-top: 1px solid rgba(255,255,255,0.06); display: flex; gap: 8px;
}
.chat-input {
  flex: 1; padding: 8px 14px; background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.1); border-radius: 18px; color: white;
  font-family: 'Montserrat', sans-serif; font-size: 12px; letter-spacing: 0.5px;
  outline: none;
}
.chat-input:focus { border-color: rgba(100,255,255,0.3); }
.chat-input::placeholder { color: rgba(255,255,255,0.2); }
.chat-send {
  padding: 8px 14px; background: rgba(100,255,255,0.08);
  border: 1px solid rgba(100,255,255,0.2); border-radius: 18px;
  color: rgba(100,255,255,0.6); font-family: 'Montserrat', sans-serif;
  font-size: 10px; letter-spacing: 2px; cursor: pointer; text-transform: uppercase;
  transition: all 0.2s;
}
.chat-send:hover { background: rgba(100,255,255,0.15); border-color: rgba(100,255,255,0.4); }
</style>
</head>
<body>

<div class="bg-grid"></div>
<div class="vignette"></div>

<div class="tap-overlay" id="tapOverlay">
  <div class="tap-text">TAP TO ACTIVATE JARVIS</div>
</div>

<div class="status-text" id="statusText">JARVIS OFFLINE</div>

<div class="jarvis-container" id="jarvisContainer">
  <div class="particle p1"></div>
  <div class="particle p2"></div>
  <div class="particle p3"></div>
  <div class="particle p4"></div>
  <div class="particle p5"></div>
  <div class="halo" id="halo"></div>
  <div class="dotted-ring"></div>
  <div class="arc-ring" id="arcRing"></div>
  <div class="arc-ring-2" id="arcRing2"></div>
  <div class="arc-thin"></div>
  <div class="center-ring" id="centerRing">
    <div class="jarvis-text" id="jarvisText">JARVIS</div>
  </div>
</div>

<div class="heard-text" id="heardText"></div>
<div class="reply-text" id="replyText"></div>

<!-- Chat panel (original JARVIS) -->
<button class="chat-toggle" id="chatToggle">&#9998;</button>
<div class="chat-panel" id="chatPanel">
  <div class="chat-header">
    <span>JARVIS</span>
    <span class="chat-header-status" id="chatStatus">ONLINE</span>
  </div>
  <div class="chat-messages" id="chatMessages"></div>
  <div class="chat-input-wrap">
    <input class="chat-input" id="chatInput" type="text" placeholder="Ask JARVIS..." autocomplete="off">
    <button class="chat-send" id="chatSend">SEND</button>
  </div>
</div>

<script>
var API = window.location.origin + '/api';
var centerRing = document.getElementById('centerRing');
var jarvisText = document.getElementById('jarvisText');
var statusText = document.getElementById('statusText');
var halo = document.getElementById('halo');
var arcRing = document.getElementById('arcRing');
var arcRing2 = document.getElementById('arcRing2');
var heardText = document.getElementById('heardText');
var replyText = document.getElementById('replyText');
var state = { speaking: false, processing: false, listening: false };
var voiceActive = false;

function setAwaiting() {
  state.speaking = false; state.listening = true;
  centerRing.className = 'center-ring listening';
  jarvisText.textContent = 'YES?';
  halo.style.background = '';
  arcRing.style.animationDuration = '';
  arcRing2.style.animationDuration = '';
  setStatus('AWAITING COMMAND');
}
function setListening() {
  setIdle();
  setStatus('LISTENING');
}
function setSpeaking() {
  state.speaking = true; state.listening = false;
  centerRing.className = 'center-ring speaking';
  jarvisText.textContent = 'SPEAKING';
  halo.style.background = 'radial-gradient(circle, rgba(100,255,255,0.35) 0%, rgba(0,150,255,0.15) 40%, transparent 70%)';
  arcRing.style.animationDuration = '1.5s';
  arcRing2.style.animationDuration = '2s';
}
function setProcessing() {
  state.speaking = false; state.listening = false;
  centerRing.className = 'center-ring speaking';
  jarvisText.textContent = 'THINKING';
  halo.style.background = 'radial-gradient(circle, rgba(0,150,255,0.3) 0%, rgba(0,100,255,0.1) 40%, transparent 70%)';
  arcRing.style.animationDuration = '0.5s';
  arcRing2.style.animationDuration = '0.8s';
}
function setIdle() {
  state.speaking = false; state.listening = false;
  centerRing.className = 'center-ring';
  jarvisText.textContent = 'JARVIS';
  halo.style.background = '';
  arcRing.style.animationDuration = '';
  arcRing2.style.animationDuration = '';
}
function setError() {
  state.speaking = false; state.listening = false;
  centerRing.className = 'center-ring error';
  jarvisText.textContent = 'ERROR';
}
function setStatus(text) {
  statusText.textContent = text;
  statusText.style.opacity = '1';
}
function showHeard(text) { heardText.textContent = text; heardText.classList.add('visible'); }
function hideHeard() { heardText.classList.remove('visible'); }
function showReply(text) { replyText.textContent = text; replyText.classList.add('visible'); }
function hideReply() { replyText.classList.remove('visible'); }

// Chat panel
var chatToggle = document.getElementById('chatToggle');
var chatPanel = document.getElementById('chatPanel');
var chatMessages = document.getElementById('chatMessages');
var chatInput = document.getElementById('chatInput');
var chatSend = document.getElementById('chatSend');
var chatStatusEl = document.getElementById('chatStatus');

chatToggle.addEventListener('click', function(e) {
  e.stopPropagation();
  chatPanel.classList.toggle('open');
  chatToggle.classList.toggle('active');
});

function addChatMessage(text, type) {
  var div = document.createElement('div');
  div.className = 'chat-msg ' + type;
  div.textContent = text;
  chatMessages.appendChild(div);
  chatMessages.scrollTop = chatMessages.scrollHeight;
  return div;
}

function sendChatMessage() {
  var msg = chatInput.value.trim();
  if (!msg) return;
  chatInput.value = '';
  addChatMessage(msg, 'user');
  processCommand(msg);
}

chatSend.addEventListener('click', sendChatMessage);
chatInput.addEventListener('keydown', function(e) { if (e.key === 'Enter') sendChatMessage(); });

function processCommand(text) {
  state.processing = true;
  setProcessing();
  setStatus('PROCESSING');
  hideHeard();
  showHeard(text);
  var safetyTimer = setTimeout(function() { state.processing = false; setIdle(); }, 60000);
  var jarvisReply = addChatMessage('', 'jarvis');

  fetch(API + '/chat', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ message: text })
  }).then(function(r) { return r.json(); })
  .then(function(data) {
    clearTimeout(safetyTimer);
    var reply = data.reply || data.response || data.error || 'No response.';
    jarvisReply.textContent = reply;
    showReply(reply);
    state.processing = false;
    setIdle();
    setStatus('JARVIS');
    if (reply && reply.length > 2) {
      speak(reply);
    } else {
      if (voiceActive) setListening();
    }
  }).catch(function(err) {
    clearTimeout(safetyTimer);
    jarvisReply.textContent = 'Error: ' + (err.message || 'Connection failed');
    setStatus('ERROR');
    state.processing = false;
    setError();
  });
}

// TTS
function speak(text) {
  if (!text || text.length < 2) { setIdle(); if (voiceActive) setListening(); return; }
  setSpeaking();
  showReply(text);
  fetch(API + '/speak', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ text: text.substring(0, 3000) })
  }).then(function(r) {
    if (!r.ok) throw new Error('server');
    return r.blob();
  }).then(function(blob) {
    if (!blob || blob.size < 200) { setIdle(); if (voiceActive) setListening(); return; }
    var url = URL.createObjectURL(blob);
    var audio = new Audio(url);
    audio.onended = function() { URL.revokeObjectURL(url); setIdle(); if (voiceActive) setListening(); };
    audio.onerror = function() { URL.revokeObjectURL(url); setIdle(); if (voiceActive) setListening(); };
    audio.play().catch(function() { setIdle(); if (voiceActive) setListening(); });
  }).catch(function() { setIdle(); if (voiceActive) setListening(); });
}

// Status auto-update
function updateStatus() {
  fetch(API + '/status').then(function(r) { return r.json(); })
  .then(function(d) {
    chatStatusEl.textContent = 'ONLINE';
    if (!state.listening && !state.processing && !state.speaking) {
      setStatus('ONLINE');
    }
  }).catch(function() {
    chatStatusEl.textContent = 'OFFLINE';
    if (!state.listening && !state.processing && !state.speaking) {
      setStatus('OFFLINE');
    }
  });
}
setInterval(updateStatus, 4000);
updateStatus();

// === Voice control ===
var mediaRecorder = null;
var mediaStream = null;
var isRecording = false;
var listenTimer = null;
var CHUNK_MS = 8000;
var awaitingCmd = false;

function startVoice() {
  navigator.mediaDevices.getUserMedia({ audio: true })
  .then(function(stream) {
    mediaStream = stream;
    setStatus('MIC OK');
    recordChunk();
  })
  .catch(function(err) {
    setStatus('MIC DENIED');
    setTimeout(startVoice, 5000);
  });
}

function recordChunk() {
  if (state.speaking || state.processing) {
    listenTimer = setTimeout(recordChunk, 500);
    return;
  }
  isRecording = true;
  if (!awaitingCmd) {
    setListening();
  } else {
    setProcessing();
    jarvisText.textContent = 'AWAITING';
  }
  var chunks = [];
  if (!mediaStream || !mediaStream.active) {
    setStatus('NO MIC STREAM');
    setTimeout(startVoice, 2000);
    return;
  }
  try {
    mediaRecorder = new MediaRecorder(mediaStream);
  } catch(e) {
    setStatus('MEDIA RECORDER FAILED');
    setTimeout(startVoice, 3000);
    return;
  }
  mediaRecorder.ondataavailable = function(e) {
    if (e.data.size > 0) chunks.push(e.data);
  };
  mediaRecorder.onstop = function() {
    isRecording = false;
    var blob = new Blob(chunks, { type: mediaRecorder.mimeType || 'audio/webm' });
    if (blob.size > 300) transcribeAudio(blob);
    listenTimer = setTimeout(recordChunk, 200);
  };
  mediaRecorder.start();
  setTimeout(function() {
    if (mediaRecorder && mediaRecorder.state === 'recording') mediaRecorder.stop();
  }, CHUNK_MS);
}

function transcribeAudio(blob) {
  var fd = new FormData();
  fd.append('audio', blob, 'speech.webm');
  fetch(API + '/voice', { method: 'POST', body: fd })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    if (!data) return;
    if (!data.ok) { return; }
    var text = (data.text || '').trim();
    if (!text) { return; }

    if (awaitingCmd) {
      awaitingCmd = false;
      addChatMessage(text, 'user');
      showHeard(text);
      processCommand(text);
      return;
    }

    if (data.wake) {
      awaitingCmd = true;
      setAwaiting();
      showReply('Yes?');
    }
  })
  .catch(function() {});
}

// Tap to activate
document.getElementById('tapOverlay').addEventListener('click', function() {
  this.classList.add('hidden');
  setTimeout(function() { this.style.display = 'none'; }.bind(this), 500);
  setStatus('ACTIVATED');
  voiceActive = true;
  startVoice();
  updateStatus();
});
</script>
</body>
</html>
